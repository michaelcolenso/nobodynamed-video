name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint / Type / Test / Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --locked
      - name: Python checks
        run: |
          uv run ruff check src tests scripts
          uv run ruff format --check src tests scripts
          uv run mypy --strict src
          uv run pytest -q
      - name: Python dependency audit
        run: uvx pip-audit
      - name: Renderer checks
        working-directory: satori-service
        run: |
          pnpm install --frozen-lockfile
          pnpm build
          pnpm audit --audit-level high

  smoke:
    name: Truth-safe smoke render
    needs: check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
      - uses: astral-sh/setup-uv@v6
      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - run: uv sync --locked
      - working-directory: satori-service
        run: pnpm install --frozen-lockfile
      - name: Start renderer
        working-directory: satori-service
        run: pnpm exec tsx src/server.ts &
      - name: Wait for renderer
        run: |
          for i in $(seq 1 30); do
            curl --fail --silent http://127.0.0.1:3001/health && exit 0
            sleep 1
          done
          exit 1
      - name: Validate test data and render smoke
        env:
          DATA_MODE: test
          SATORI_URL: http://127.0.0.1:3001
        run: |
          uv run nbn data doctor
          uv run nbn smoke
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoke-${{ github.sha }}
          path: |
            out/*.summary.json
            out/*.qc.html
            releases/bertha-2025/**
          retention-days: 14
          if-no-files-found: warn
